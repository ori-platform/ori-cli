name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: none

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-mod=readonly"
      GONOSUMCHECK: ""

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Guard supply-chain invariants
        run: python3 scripts/check_workflows.py

      - name: Verify module integrity
        run: go mod verify

      - name: Install pre-commit (hash-locked)
        run: pip install --require-hashes -r .ci/requirements-precommit.txt

      - name: Pre-commit (format + hygiene)
        env:
          SKIP: no-commit-to-branch
        run: pre-commit run --show-diff-on-failure --all-files

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
