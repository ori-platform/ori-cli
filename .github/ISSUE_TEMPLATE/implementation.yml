name: "Implementation Issue"
description: "Implementation task from the Ori CLI Implementation Reference"
title: "[CLI-NNN] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        > Every issue must have clear acceptance criteria, explicit dependencies, and enough context
        > that a contributor who has never seen the codebase can deliver against it.
        > Keep this issue scoped to the repository contract below.


  - type: textarea
    id: context
    attributes:
      label: Context
      description: "Why this work exists. Link to the implementation reference section and the architectural purpose."
      placeholder: |
        One paragraph. A contributor who reads only this should understand the "why."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: "What this issue delivers. Be specific about files, packages, and interfaces."
      placeholder: |
        - [ ] Cobra command under `cmd/`
        - [ ] Internal package under `internal/` to create or modify
        - [ ] Runtime bridge command or output contract changes
        - [ ] Tests for text and JSON output where applicable
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-Goals
      description: "What this issue explicitly does NOT do. Prevents scope creep."
      placeholder: |
        - This issue does not implement unrelated repo work.
        - This issue does not change cross-repo contracts unless explicitly labelled contract-change.
    validations:
      required: true

  - type: textarea
    id: technical-spec
    attributes:
      label: Technical Specification
      description: "Code signatures, data types, algorithms, error handling. Enough detail to implement without guessing."
      placeholder: |
        ```go
        func NewRootCommand(out io.Writer, errOut io.Writer) *cobra.Command
        ```
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: "Checkboxes. Every one must be checked before the PR is merged."
      placeholder: |
        - [ ] Command help and flags are documented
        - [ ] JSON output is deterministic when `--output json` is used
        - [ ] Runtime-owned behavior delegates through the bridge
        - [ ] `go test ./...` passes
        - [ ] `go vet ./...` passes
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Tests Required
      description: "Specific test names and what each verifies."
      placeholder: |
        | Test | Verifies |
        |------|----------|
        | `Test<Command>TextOutput` | Operator-readable output |
        | `Test<Command>JSONOutput` | Machine-readable output contract |
        | `Test<Command>Error` | Exit code and stderr behavior |
    validations:
      required: true

  - type: textarea
    id: invariants
    attributes:
      label: "Invariants — Do Not Violate"
      description: "Copy the specific AGENTS.md invariants that apply to this issue."
      placeholder: |
        - CLI must not parse `ori.yaml` independently; config validation delegates to runtime bridge.
        - Deploy keypairs are generated on-device; private key never leaves device.
        - CLI must not bypass runtime authority for state, Tier C/D, or policy decisions.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: "What blocks this issue and what it unblocks."
      placeholder: |
        **Blocked by:**
        - #NN — short title

        **Unblocks:**
        - #MM — short title
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Contract References
      description: "Links to specs, implementation references, runtime code, or SDK contract files relevant to this repo."
      placeholder: |
        - CLI Implementation Reference section for this issue
        - Runtime `ori.cli_bridge` contract when bridge-backed
        - `ori-specs` CLI/operator contracts when available
        - SDK helper contracts for health, hub, gateway, or signing when used
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "poc-critical"
        - "post-poc"
    validations:
      required: true

  - type: checkboxes
    id: labels-check
    attributes:
      label: Additional Labels
      options:
        - label: "contract-change — modifies cross-repo contract"
        - label: "runtime-impact — requires follow-up PR in ori-runtime"
        - label: "security-sensitive — touches signing, tokens, keypairs, Tier C/D, or device credentials"
